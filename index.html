<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline'; img-src 'self' https: data:;">
    
    <title>Zunny Motos | Gestión de Ventas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        :root { --accent: #22c55e; }
        body { 
            background: #09090b; color: #fafafa; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-tire.png');
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
        }
        .glass { background: rgba(24, 24, 27, 0.96); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .cart-sidebar { transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .cart-active .cart-sidebar { transform: translateX(0); }
        
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 40px rgba(34, 197, 94, 0.1); }

        .form-input {
            background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem;
            padding: 0.75rem 1rem; width: 100%; color: white; font-weight: 600;
            transition: all 0.3s; font-size: 14px;
        }
        .form-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(34, 197, 94, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .btn-pulse { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="antialiased">

    <header class="max-w-5xl mx-auto pt-10 pb-6 px-6 text-center" data-aos="fade-down">
        <h1 class="text-5xl font-black italic tracking-tighter uppercase">ZUNNY<span class="text-green-500">.</span></h1>
        <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-[0.4em] mt-2">Sistema Central de Distribución Bolivia</p>
    </header>

    <div class="max-w-6xl mx-auto px-6 mb-8 sticky top-0 z-50">
        <div class="glass p-4 rounded-[2rem] flex flex-col md:flex-row gap-4 items-center border border-white/10 shadow-2xl">
            <div class="relative w-full md:w-1/3">
                <input type="text" id="searchInput" onkeyup="liveSearch()" placeholder="Buscar por medida o marca..." 
                       class="form-input pl-10 border-none bg-zinc-900/50">
                <svg class="w-4 h-4 absolute left-4 top-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-2/3">
                <button onclick="filterCat('todas', this)" class="bg-green-500 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap">Todas</button>
                <button onclick="filterCat('llanta', this)" class="text-zinc-400 px-5 py-2 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap hover:bg-zinc-800">Llantas</button>
                <button onclick="filterCat('casco', this)" class="text-zinc-400 px-5 py-2 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap hover:bg-zinc-800">Cascos</button>
                <button onclick="filterCat('accesorio', this)" class="text-zinc-400 px-5 py-2 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap hover:bg-zinc-800">Accesorios</button>
            </div>
        </div>
    </div>

    <main id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 px-6 pb-20"></main>

    <footer class="max-w-6xl mx-auto px-6 py-12 border-t border-zinc-900 text-center space-y-6">
        <div class="flex flex-col md:flex-row justify-center items-center gap-10">
            <div class="text-center md:text-left">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-1">Base de Operaciones</p>
                <p class="text-sm font-bold text-zinc-300">Santa Cruz de la Sierra, Bolivia</p>
            </div>
            <div class="text-center md:text-left">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-1">Contacto Corporativo</p>
                <p class="text-sm font-bold text-zinc-300">+591 71483922</p>
            </div>
        </div>
    </footer>

    <button onclick="toggleCart()" class="fixed bottom-6 right-6 z-[60] bg-green-600 p-5 rounded-2xl shadow-2xl active:scale-90 border-2 border-green-400/20 btn-pulse">
        <span id="badge" class="absolute -top-2 -right-2 bg-white text-green-700 font-black text-[10px] w-6 h-6 rounded-full flex items-center justify-center">0</span>
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[65] hidden"></div>
    <aside class="cart-sidebar fixed top-0 right-0 h-full w-full max-w-md bg-zinc-950 z-[70] shadow-2xl p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase">Finalizar <span class="text-green-500">Orden</span></h2>
            <button onclick="toggleCart()" class="text-zinc-600 hover:text-white text-[10px] font-black">CERRAR</button>
        </div>

        <div class="space-y-4 mb-6">
            <input type="text" id="nombreCliente" placeholder="Nombre completo o Empresa" class="form-input" maxlength="50">
            <div class="grid grid-cols-2 gap-2">
                <select id="departamento" onchange="updateCiudades()" class="form-input text-xs">
                    <option value="" disabled selected>Dpto.</option>
                    <option value="Santa Cruz">Santa Cruz</option>
                    <option value="La Paz">La Paz</option>
                    <option value="Cochabamba">Cochabamba</option>
                    <option value="Oruro">Oruro</option>
                    <option value="Potosí">Potosí</option>
                    <option value="Tarija">Tarija</option>
                    <option value="Chuquisaca">Chuquisaca</option>
                    <option value="Beni">Beni</option>
                    <option value="Pando">Pando</option>
                </select>
                <select id="ciudad" class="form-input text-xs" disabled>
                    <option value="" disabled selected>Ciudad</option>
                </select>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 space-y-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="quiereFactura" onchange="toggleFactura()" class="w-4 h-4 accent-green-500">
                    <span class="text-[10px] text-zinc-400 uppercase font-black">Requiero Factura Fiscal</span>
                </label>
                <div id="camposFactura" class="hidden space-y-2">
                    <input type="text" id="razonSocial" placeholder="Nombre en Factura" class="form-input text-xs" maxlength="60">
                    <input type="text" id="nitCliente" placeholder="NIT o CI" class="form-input text-xs" maxlength="20">
                </div>
            </div>
        </div>

        <div id="cartItems" class="flex-grow overflow-y-auto space-y-3 pr-2 no-scrollbar"></div>

        <div class="mt-6 pt-6 border-t border-zinc-900">
            <div class="flex justify-between items-center mb-6">
                <span class="text-zinc-500 font-bold text-xs uppercase tracking-widest">Total Cotizado</span>
                <span id="cartTotal" class="text-3xl font-black text-white tracking-tighter">0 BS</span>
            </div>
            <button id="btnConfirmar" onclick="sendWA()" class="w-full bg-green-600 hover:bg-green-500 py-5 rounded-2xl text-white font-black uppercase tracking-widest transition-all shadow-xl">
                Confirmar y Enviar
            </button>
        </div>
    </aside>

    <div id="qrModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center border-green-500/30">
            <h3 class="text-2xl font-black italic uppercase mb-2">Pago <span class="text-green-500">Instantáneo</span></h3>
            <div class="bg-white p-4 rounded-3xl mb-6 inline-block mt-6">
                <img src="Qr_pagos.png" alt="QR" class="w-48 h-48 object-contain">
            </div>
            <button onclick="finalizarTodo()" class="w-full bg-green-600 py-4 rounded-2xl text-white font-black uppercase mb-4 tracking-widest shadow-lg">He realizado el pago</button>
            <button onclick="cerrarQR()" class="text-zinc-500 text-[10px] font-black uppercase hover:text-white transition-colors">Enviar solo cotización</button>
        </div>
    </div>

    <script>
        const ciudadesBolivia = {
            "Santa Cruz": ["Santa Cruz de la Sierra", "Montero", "Warnes", "La Guardia", "San Ignacio", "Camiri"],
            "La Paz": ["La Paz", "El Alto", "Viacha", "Caranavi"],
            "Cochabamba": ["Cochabamba", "Sacaba", "Quillacollo", "Villa Tunari"],
            "Oruro": ["Oruro", "Huanuni"], "Potosí": ["Potosí", "Uyuni", "Villazón"],
            "Tarija": ["Tarija", "Yacuiba", "Bermejo"], "Chuquisaca": ["Sucre"],
            "Beni": ["Trinidad", "Riberalta", "Guayaramerín"], "Pando": ["Cobija"]
        };

        let db = [];
        let cart = [];
        const WA_NUMBER = "59171483922";
        const GOOGLE_SCRIPT_URL = "URL_DE_TU_SCRIPT_DE_GOOGLE_AQUI"; // <--- PEGA TU URL AQUÍ

        async function init() {
            try {
                const res = await fetch('llantas_limpias.json');
                db = await res.json();
                render(db);
            } catch (e) { console.error("Error cargando base de datos."); }
        }

        function liveSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = db.filter(item => 
                (item.medida || item.nombre || "").toLowerCase().includes(term) || 
                (item.marca || "").toLowerCase().includes(term)
            );
            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('grid');
            if(items.length === 0) {
                grid.innerHTML = "<p class='text-center col-span-full py-20 text-zinc-600 font-bold uppercase text-xs'>Sin resultados</p>";
                return;
            }
            grid.innerHTML = items.map((l, i) => `
                <div class="product-card glass p-8 rounded-[2.5rem] flex flex-col justify-between h-full border border-white/5" data-aos="zoom-in">
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-zinc-900 text-green-500 text-[9px] px-3 py-1 rounded-lg font-black uppercase tracking-widest border border-green-500/20">${l.marca || 'ZUNNY'}</span>
                        <span class="text-3xl font-black text-white tracking-tighter">${l.precio} BS</span>
                    </div>
                    <h3 class="text-2xl font-black text-white mb-6 uppercase tracking-tighter leading-[0.9]">${l.medida || l.nombre}</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between bg-black/40 p-1 rounded-2xl border border-white/5">
                            <button onclick="stepQty('input-${i}', -1)" class="w-10 h-10 rounded-xl hover:bg-zinc-800 text-white font-bold transition-all">-</button>
                            <input type="number" id="input-${i}" value="1" min="1" class="w-12 bg-transparent text-center font-black text-lg outline-none">
                            <button onclick="stepQty('input-${i}', 1)" class="w-10 h-10 rounded-xl hover:bg-zinc-800 text-white font-bold transition-all">+</button>
                        </div>
                        <button onclick="addToCartFromCard(${i})" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-green-600 hover:text-white transition-all shadow-lg active:scale-95">Agregar</button>
                    </div>
                </div>
            `).join('');
        }

        function sanitize(str) { return str.replace(/[<>\\\\/]/g, "").trim(); }

        function sendWA() {
            const n = sanitize(document.getElementById('nombreCliente').value);
            const d = document.getElementById('departamento').value;
            const c = document.getElementById('ciudad').value;
            if(n.length < 3 || !d || !c) return alert("⚠️ Complete todos los datos de envío.");
            if(cart.length === 0) return alert("⚠️ El carrito está vacío.");

            const btn = document.getElementById('btnConfirmar');
            btn.disabled = true; btn.innerHTML = `PROCESANDO...`;
            setTimeout(() => { btn.disabled = false; btn.innerText = "CONFIRMAR PEDIDO"; }, 4000);
            document.getElementById('qrModal').classList.remove('hidden');
        }

        async function ejecutarEnvioWA(conPago) {
            const n = sanitize(document.getElementById('nombreCliente').value);
            const d = document.getElementById('departamento').value;
            const c = document.getElementById('ciudad').value;
            const f = document.getElementById('quiereFactura').checked;
            const totalVenta = cart.reduce((a, b) => a + (b.precio*b.qty), 0);
            const folio = `ZM-${new Date().getFullYear()}-${Math.random().toString(36).substring(2,7).toUpperCase()}`;
            
            // --- LOGÍSTICA SMART ---
            let sugLog = "🚛 Transporte estándar."; let tEst = "⏱️ 24 a 48 horas.";
            if(d === "Santa Cruz") { sugLog = "📍 Entrega local inmediata."; tEst = "⏱️ 2 a 4 horas."; }
            if(d === "Beni" || d === "Pando") { sugLog = "🚚 Envío vía Flota/Terrestre."; tEst = "⏱️ 48 a 72 horas."; }

            // --- NUBE (GOOGLE SHEETS) ---
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ folio, nombre: n, departamento: d, ciudad: c, total: totalVenta, factura: f ? "SI" : "NO", productos: cart.map(x => `${x.qty}x ${x.medida}`).join(", ") })
            });

            // --- MENSAJE ---
            let msg = `*ZUNNY MOTOS - ${conPago ? 'PAGO CONFIRMADO' : 'NUEVO PEDIDO'}*\n🔖 *FOLIO:* ${folio}\n--------------------------------\n👤 *CLIENTE:* ${n.toUpperCase()}\n📍 *DESTINO:* ${d} - ${c}\n\n*LOGÍSTICA:* ${sugLog}\n${tEst}\n--------------------------------\n*PRODUCTOS:*\n`;
            cart.forEach(x => msg += `• ${x.qty}x ${x.medida} (${x.precio * x.qty} BS)\n`);
            msg += `\n💰 *TOTAL: ${totalVenta} BS*`;
            
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function stepQty(id, delta) { 
            const input = document.getElementById(id); let val = parseInt(input.value) + delta; input.value = val < 1 ? 1 : val; 
        }
        function updateCiudades() {
            const dep = document.getElementById('departamento').value;
            const citySelect = document.getElementById('ciudad');
            citySelect.innerHTML = '<option value="" disabled selected>Ciudad</option>';
            if (ciudadesBolivia[dep]) {
                citySelect.disabled = false;
                ciudadesBolivia[dep].forEach(c => {
                    const opt = document.createElement('option'); opt.value = c; opt.textContent = c; citySelect.appendChild(opt);
                });
            }
        }
        function addToCartFromCard(index) {
            const p = db[index]; const qty = parseInt(document.getElementById(`input-${index}`).value);
            const medida = p.medida || p.nombre;
            const existing = cart.find(x => x.medida === medida);
            if(existing) { existing.qty += qty; } else { cart.push({ medida, precio: p.precio, marca: p.marca || 'ZUNNY', qty }); }
            updateUI();
        }
        function updateUI() {
            const list = document.getElementById('cartItems'); let sum = 0, count = 0;
            list.innerHTML = cart.map((x, i) => {
                sum += x.precio * x.qty; count += x.qty;
                return `<div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                    <div><h4 class="text-white font-bold text-[10px] uppercase">${x.medida}</h4><p class="text-[9px] text-zinc-500 font-black">${x.qty} UNID.</p></div>
                    <button onclick="remove(${i})" class="text-red-500 text-[10px] font-black uppercase">Borrar</button>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `${sum} BS`;
            document.getElementById('badge').innerText = count;
        }
        function remove(i) { cart.splice(i, 1); updateUI(); }
        function toggleCart() { document.body.classList.toggle('cart-active'); document.getElementById('overlay').classList.toggle('hidden'); }
        function toggleFactura() { document.getElementById('camposFactura').classList.toggle('hidden', !document.getElementById('quiereFactura').checked); }
        function filterCat(cat, btn) {
            document.querySelectorAll('nav button').forEach(b => b.className = "text-zinc-400 px-5 py-2 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap hover:bg-zinc-800");
            btn.className = "bg-green-500 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap";
            render(cat === 'todas' ? db : db.filter(i => (i.categoria || 'llanta').toLowerCase() === cat));
        }
        function cerrarQR() { document.getElementById('qrModal').classList.add('hidden'); ejecutarEnvioWA(false); }
        function finalizarTodo() { document.getElementById('qrModal').classList.add('hidden'); ejecutarEnvioWA(true); }

        AOS.init({ duration: 800, once: true });
        init();
    </script>
</body>
</html>

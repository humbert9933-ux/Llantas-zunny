<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-black text-green-500 text-center mb-6">ZUNNY MOTOS</h1>
    
    <input id="inputBusqueda" onkeyup="filtrarLlantas()" type="text" placeholder="Buscar medida..." 
           class="w-full bg-zinc-800 border-2 border-zinc-700 rounded-xl p-4 mb-6 outline-none focus:border-green-500">

    <div id="listaResultados" class="space-y-4"></div>

    <script>
        let inventario = [];

        async function cargarDatos() {
            try {
                const respuesta = await fetch('llantas_limpias.json');
                inventario = await respuesta.json();
                mostrarResultados(inventario);
            } catch (e) {
                document.getElementById('listaResultados').innerHTML = "Error cargando datos.";
            }
        }

        function filtrarLlantas() {
            const busqueda = document.getElementById('inputBusqueda').value.toLowerCase();
            const filtrados = inventario.filter(item => 
                item.medida.toLowerCase().includes(busqueda) || 
                item.descripcion.toLowerCase().includes(busqueda)
            );
            mostrarResultados(filtrados);
        }

        function mostrarResultados(lista) {
            const contenedor = document.getElementById('listaResultados');
            contenedor.innerHTML = lista.map(item => `
                <div class="glass-card p-4 rounded-xl flex justify-between items-center shadow-lg">
                    <div>
                        <span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">${item.marca}</span>
                        <p class="text-xl font-bold">${item.medida}</p>
                        <p class="text-[10px] text-zinc-500 uppercase">${item.descripcion.substring(0, 35)}...</p>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black">${item.precio}</p>
                        <p class="text-[10px] text-zinc-400">BOLIVIANOS</p>
                    </div>
                </div>
            `).join('');
        }

        cargarDatos();
    </script>
</body>
</html>
